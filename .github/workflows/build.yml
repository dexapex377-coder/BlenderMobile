name: Build Blender Android ARM64

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

env:
  NDK_VERSION: "r26d"
  CCACHE_DIR: ${{ github.workspace }}/.ccache

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      NDK_CACHE_KEY: ndk-Linux-r26d
      LIBS_CACHE_KEY: libs-Linux-2024-01
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Restore ccache
        uses: actions/cache/restore@v4
        id: ccache-restore
        with:
          path: ${{ env.CCACHE_DIR }}
          key: ccache-android-${{ runner.os }}-${{ github.sha }}
          restore-keys: |
            ccache-android-${{ runner.os }}-

      - name: Restore precompiled libraries
        uses: actions/cache/restore@v4
        id: libs-restore
        with:
          path: ${{ github.workspace }}/../lib-android_arm64
          key: ${{ env.LIBS_CACHE_KEY }}

      - name: Download precompiled libraries
        if: steps.libs-restore.outputs.cache-hit != 'true'
        run: |
          echo "Cloning precompiled Android ARM64 libraries..."
          git clone --depth 1 https://github.com/dshawshank/lib-android_arm64.git \
            ${{ github.workspace }}/../lib-android_arm64

      - name: Save precompiled libraries cache
        if: steps.libs-restore.outputs.cache-hit != 'true'
        uses: actions/cache/save@v4
        with:
          path: ${{ github.workspace }}/../lib-android_arm64
          key: ${{ env.LIBS_CACHE_KEY }}

      - name: Setup Android NDK
        uses: nttld/setup-ndk@v1
        id: setup-ndk
        with:
          ndk-version: ${{ env.NDK_VERSION }}
          add-to-path: false

      - name: Install build dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq ninja-build ccache libpng-dev zlib1g-dev

      - name: Phase 1 - Build host tools natively
        run: |
          GITROOT="${{ github.workspace }}"
          LIB_DIR="$GITROOT/../lib-android_arm64"
          HOST_TOOLS="$GITROOT/build/host_tools"
          mkdir -p "$HOST_TOOLS"

          # --- datatoc ---
          gcc -O2 -o "$HOST_TOOLS/datatoc" \
            "$GITROOT/source/blender/datatoc/datatoc.c" -lm
          echo "datatoc built"

          # --- datatoc_icon (host-native, using system libpng) ---
          # Note: define __LITTLE_ENDIAN__ because the icon .dat files use
          # little-endian uint32 headers (checked via #ifndef __LITTLE_ENDIAN__).
          gcc -O2 -o "$HOST_TOOLS/datatoc_icon" \
            -D__LITTLE_ENDIAN__ \
            "$GITROOT/source/blender/datatoc/datatoc_icon.c" \
            -lpng -lz -lm && \
            echo "datatoc_icon built" || \
            echo "Warning: datatoc_icon build failed"

          # --- smaa_areatex (host-native) ---
          g++ -O2 -o "$HOST_TOOLS/smaa_areatex" \
            "$GITROOT/extern/smaa_areatex/smaa_areatex.cpp" -lm && \
            echo "smaa_areatex built" || \
            echo "Warning: smaa_areatex build failed"

      - name: Phase 2 - Build and run makesdna host tool
        run: |
          GITROOT="${{ github.workspace }}"
          DNA_INC_DIR="$GITROOT/source/blender/makesdna"
          DNA_GEN_DIR="$GITROOT/build/host_dna_gen"
          mkdir -p "$DNA_GEN_DIR"

          # Generate dna_includes_all.h and dna_includes_as_strings.h
          # (replicates what CMake's file(GENERATE ...) does)
          # Only use SRC_DNA_INC (lines up to the closing paren at line 92)
          DNA_HDR_LIST=$(sed -n '4,91s/.*makesdna\/\(DNA_[a-zA-Z0-9_]*\.h\).*/\1/p' \
            "$GITROOT/source/blender/CMakeLists.txt")
          {
            echo "/* Do not edit manually, changes will be overwritten. */"
            echo "$DNA_HDR_LIST" | while IFS= read -r hdr; do echo "#include \"$hdr\""; done
          } > "$DNA_GEN_DIR/dna_includes_all.h"
          {
            echo "/* Do not edit manually, changes will be overwritten. */"
            echo "$DNA_HDR_LIST" | while IFS= read -r hdr; do echo "\"$hdr\","; done
          } > "$DNA_GEN_DIR/dna_includes_as_strings.h"
          echo "dna_includes headers generated"

          # Compile makesdna manually for host
          CFLAGS="-O2 -I$DNA_INC_DIR -I$GITROOT/source/blender/blenlib \
            -I$GITROOT/intern/atomic -I$GITROOT/intern/guardedalloc -I$DNA_GEN_DIR"

          gcc $CFLAGS -c -o /tmp/ms_main.o  "$DNA_INC_DIR/intern/makesdna.c"
          gcc $CFLAGS -c -o /tmp/ms_utils.o "$DNA_INC_DIR/intern/dna_utils.c"
          gcc $CFLAGS -c -o /tmp/ms_asrt.o "$GITROOT/source/blender/blenlib/intern/BLI_assert.c"
          gcc $CFLAGS -c -o /tmp/ms_ghash.o "$GITROOT/source/blender/blenlib/intern/BLI_ghash.c"
          gcc $CFLAGS -c -o /tmp/ms_gh2.o  "$GITROOT/source/blender/blenlib/intern/BLI_ghash_utils.c"
          gcc $CFLAGS -c -o /tmp/ms_mema.o "$GITROOT/source/blender/blenlib/intern/BLI_memarena.c"
          gcc $CFLAGS -c -o /tmp/ms_memp.o "$GITROOT/source/blender/blenlib/intern/BLI_mempool.c"
          gcc $CFLAGS -c -o /tmp/ms_hash.o "$GITROOT/source/blender/blenlib/intern/hash_mm2a.c"
          gcc $CFLAGS -c -o /tmp/ms_ml1.o "$GITROOT/intern/guardedalloc/intern/mallocn.c"
          gcc $CFLAGS -c -o /tmp/ms_ml2.o "$GITROOT/intern/guardedalloc/intern/mallocn_guarded_impl.c"
          gcc $CFLAGS -c -o /tmp/ms_ml3.o "$GITROOT/intern/guardedalloc/intern/mallocn_lockfree_impl.c"
          g++ $CFLAGS -c -o /tmp/ms_leak.o "$GITROOT/intern/guardedalloc/intern/leak_detector.cc"
          g++ $CFLAGS -c -o /tmp/ms_mem.o  "$GITROOT/intern/guardedalloc/intern/memory_usage.cc"

          g++ -o /tmp/makesdna \
            /tmp/ms_main.o /tmp/ms_utils.o /tmp/ms_asrt.o /tmp/ms_ghash.o \
            /tmp/ms_gh2.o /tmp/ms_mema.o /tmp/ms_memp.o /tmp/ms_hash.o \
            /tmp/ms_ml1.o /tmp/ms_ml2.o /tmp/ms_ml3.o \
            /tmp/ms_leak.o /tmp/ms_mem.o \
            -lm -lpthread
          echo "makesdna compiled"

          # Run makesdna to generate DNA files
          /tmp/makesdna \
            "$DNA_GEN_DIR/dna.c" \
            "$DNA_GEN_DIR/dna_type_offsets.h" \
            "$DNA_GEN_DIR/dna_verify.c" \
            "$DNA_INC_DIR/"
          echo "DNA files generated:"
          ls -la "$DNA_GEN_DIR/dna.c" "$DNA_GEN_DIR/dna_type_offsets.h"

          # Copy tools for later use
          HOST_TOOLS="$GITROOT/build/host_tools"
          cp /tmp/makesdna "$HOST_TOOLS/makesdna"
          cp "$DNA_GEN_DIR/dna_includes_all.h" "$DNA_GEN_DIR/dna_includes_as_strings.h" \
            "$DNA_GEN_DIR/dna.c" "$DNA_GEN_DIR/dna_type_offsets.h" "$DNA_GEN_DIR/dna_verify.c" \
            "$HOST_TOOLS/"

      - name: Phase 3 - Configure CMake natively for makesrna
        run: |
          GITROOT="${{ github.workspace }}"
          LIB_DIR="$GITROOT/../lib-android_arm64"

          # Feature flags that affect makesrna code generation must match cross-compile config.
          cmake -B "$GITROOT/build_host" -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DLIB_DIR="${LIB_DIR}" \
            -DWITH_BLENDER=ON \
            -DWITH_PYTHON=OFF \
            -DWITH_INTERNATIONAL=OFF \
            -DWITH_CODEC_FFMPEG=OFF \
            -DWITH_OPENAL=OFF \
            -DWITH_SDL=OFF \
            -DWITH_GHOST_X11=OFF \
            -DWITH_GHOST_WAYLAND=OFF \
            -DWITH_JACK=OFF \
            -DWITH_PULSEAUDIO=OFF \
            -DWITH_OPENCOLLADA=OFF \
            -DWITH_OPENSUBDIV=OFF \
            -DWITH_OPENVDB=OFF \
            -DWITH_NANOVDB=OFF \
            -DWITH_ALEMBIC=OFF \
            -DWITH_USD=OFF \
            -DWITH_CYCLES=OFF \
            -DWITH_TBB=OFF \
            -DWITH_FFTW3=OFF \
            -DWITH_GMP=OFF \
            -DWITH_POTRACE=OFF \
            -DWITH_GTESTS=OFF \
            -DWITH_VULKAN_BACKEND=OFF \
            -DWITH_BUILDINFO=OFF \
            -DWITH_BULLET=OFF \
            -DWITH_AUDASPACE=OFF \
            -DWITH_MOD_FLUID=OFF \
            -DWITH_FREESTYLE=OFF \
            -DWITH_IMAGE_OPENEXR=OFF \
            -DWITH_IMAGE_CINEON=OFF \
            -DWITH_IMAGE_TIFF=OFF \
            -DWITH_IMAGE_JPEG=OFF \
            -DWITH_IMAGE_PNG=OFF \
            -DWITH_MOD_OCEANSIM=OFF \
            -DWITH_MOD_REMESH=OFF \
            -DWITH_XR_OPENXR=OFF \
            -DWITH_MEM_VALGRIND=OFF \
            -DWITH_HARU=OFF \
            -DWITH_OPENIMAGEDENOISE=OFF \
            -DWITH_LZO=OFF \
            -DWITH_LLVM=OFF \
            -DWITH_INSTALL_PORTABLE=ON \
            2>&1 | tail -30
          echo "Native CMake configured"

      - name: Phase 4 - Copy generated DNA files into native build tree
        run: |
          GITROOT="${{ github.workspace }}"
          HOST_TOOLS="$GITROOT/build/host_tools"
          DNA_GEN_DIR_HOST="$GITROOT/build_host/source/blender/makesdna/intern"
          mkdir -p "$DNA_GEN_DIR_HOST"
          cp -v "$HOST_TOOLS/dna_includes_all.h" \
             "$HOST_TOOLS/dna_includes_as_strings.h" \
             "$HOST_TOOLS/dna.c" \
             "$HOST_TOOLS/dna_type_offsets.h" \
             "$HOST_TOOLS/dna_verify.c" \
             "$DNA_GEN_DIR_HOST/"
          echo "DNA files copied to native build tree"

      - name: Phase 5 - Build bf_dna and makesrna natively
        run: |
          GITROOT="${{ github.workspace }}"
          # Build bf_dna (needs generated DNA files)
          ninja -C "$GITROOT/build_host" bf_dna 2>&1 | tail -10
          echo "bf_dna built natively"

          # Build bf_dna_blenlib
          ninja -C "$GITROOT/build_host" bf_dna_blenlib 2>&1 | tail -10
          echo "bf_dna_blenlib built natively"

          # Build makesrna (static lib)
          ninja -C "$GITROOT/build_host" makesrna 2>&1 | tail -10
          echo "makesrna built natively"

      - name: Phase 6 - Link and run makesrna host tool
        run: |
          GITROOT="${{ github.workspace }}"
          RNA_GEN_DIR="$GITROOT/build_host/source/blender/makesrna/intern"
          RNA_PARENT_DIR="$GITROOT/build_host/source/blender/makesrna"
          mkdir -p "$RNA_GEN_DIR" "$RNA_PARENT_DIR"

          # Link makesrna executable from native static libs
          MAKESRNA_LIB="$GITROOT/build_host/lib/libmakesrna.a"
          BF_DNA_LIB="$GITROOT/build_host/lib/libbf_dna.a"
          BF_DNA_BLENLIB="$GITROOT/build_host/lib/libbf_dna_blenlib.a"

          if [ ! -f "$MAKESRNA_LIB" ] || [ ! -f "$BF_DNA_LIB" ] || [ ! -f "$BF_DNA_BLENLIB" ]; then
            echo "ERROR: Static libraries not found"
            ls -la "$GITROOT/build_host/lib/"
            exit 1
          fi

          g++ -o /tmp/makesrna \
            -Wl,--start-group \
            "$BF_DNA_LIB" \
            "$BF_DNA_BLENLIB" \
            "$MAKESRNA_LIB" \
            -Wl,--end-group \
            -lm -lpthread
          echo "makesrna executable linked"

          # Run makesrna to generate RNA files
          # argv[1] = intern dir → rna_*_gen.c, rna_prototypes_gen.h
          # argv[2] = parent dir → RNA_prototypes.h
          /tmp/makesrna "$RNA_GEN_DIR/" "$RNA_PARENT_DIR/"
          echo "makesrna ran. Generated files:"
          ls -la "$RNA_GEN_DIR/" | head -20

          # Count generated files
          echo "Total rna_*_gen.c files: $(ls "$RNA_GEN_DIR"/rna_*_gen.c 2>/dev/null | wc -l)"

          # Copy generated RNA files to host tools for cross-compile
          HOST_TOOLS="$GITROOT/build/host_tools"
          mkdir -p "$HOST_TOOLS"
          cp -v "$RNA_GEN_DIR"/*.c "$RNA_GEN_DIR"/*.h "$HOST_TOOLS/" 2>/dev/null || true
          echo "RNA files staged to host tools"

      - name: Phase 7 - Stage makesrna host tool
        run: |
          GITROOT="${{ github.workspace }}"
          HOST_TOOLS="$GITROOT/build/host_tools"
          cp /tmp/makesrna "$HOST_TOOLS/makesrna" 2>/dev/null || true
          echo "Host tools:"
          ls -la "$HOST_TOOLS/"

      - name: Fix pre-built libs - configure missing pnglibconf.h
        run: |
          PNG_DIR="${{ github.workspace }}/../lib-android_arm64/Png/include/libpng-1.6.40"
          if [ -f "$PNG_DIR/scripts/pnglibconf.h.prebuilt" ] && [ ! -f "$PNG_DIR/pnglibconf.h" ]; then
            cp -v "$PNG_DIR/scripts/pnglibconf.h.prebuilt" "$PNG_DIR/pnglibconf.h"
          fi

      - name: Configure CMake for cross-compile
        run: |
          GITROOT="${{ github.workspace }}"
          LIB_DIR="$GITROOT/../lib-android_arm64"
          NDK_DIR="${{ steps.setup-ndk.outputs.ndk-path }}"
          HOST_TOOLS="$GITROOT/build/host_tools"

          cmake -B "$GITROOT/build" \
            -G "Ninja" \
            -DCMAKE_TOOLCHAIN_FILE="${NDK_DIR}/build/cmake/android.toolchain.cmake" \
            -DANDROID_ABI=arm64-v8a \
            -DANDROID_PLATFORM=android-24 \
            -DCMAKE_BUILD_TYPE=Release \
            -DLIB_DIR="${LIB_DIR}" \
            -DDATATOC_EXECUTABLE="$HOST_TOOLS/datatoc" \
            -DDATATOC_ICON_EXECUTABLE="$HOST_TOOLS/datatoc_icon" \
            -DSMAA_AREATEX_EXECUTABLE="$HOST_TOOLS/smaa_areatex" \
            -DMAKESDNA_EXECUTABLE="$HOST_TOOLS/makesdna" \
            -DMAKESRNA_EXECUTABLE="$HOST_TOOLS/makesrna" \
            -DWITH_BLENDER=ON \
            -DWITH_PYTHON=ON \
            -DWITH_INTERNATIONAL=OFF \
            -DWITH_MOD_FLUID=OFF \
            -DWITH_CODEC_FFMPEG=ON \
            -DWITH_OPENAL=ON \
            -DWITH_SDL=OFF \
            -DWITH_GHOST_X11=OFF \
            -DWITH_GHOST_WAYLAND=OFF \
            -DWITH_JACK=OFF \
            -DWITH_PULSEAUDIO=OFF \
            -DWITH_OPENCOLLADA=ON \
            -DWITH_OPENSUBDIV=ON \
            -DWITH_OPENVDB=ON \
            -DWITH_NANOVDB=ON \
            -DWITH_ALEMBIC=ON \
            -DWITH_USD=OFF \
            -DWITH_CYCLES=ON \
            -DWITH_CYCLES_OSL=OFF \
            -DWITH_CYCLES_EMBREE=ON \
            -DWITH_TBB=ON \
            -DWITH_OPENIMAGEDENOISE=ON \
            -DWITH_FFTW3=ON \
            -DWITH_GMP=ON \
            -DWITH_POTRACE=ON \
            -DWITH_LLVM=OFF \
            -DWITH_GTESTS=OFF \
            -DWITH_VULKAN_BACKEND=OFF \
            -DWITH_INSTALL_PORTABLE=ON \
            -DWITH_BUILDINFO=OFF \
            -DWITH_COMPILER_CCACHE=ON \
            -DCMAKE_C_COMPILER_LAUNCHER=ccache \
            -DCMAKE_CXX_COMPILER_LAUNCHER=ccache

      - name: Cross-compile Blender
        shell: bash -o pipefail {0}
        run: |
          cmake --build ${{ github.workspace }}/build --target blender -j$(nproc) 2>&1 | tee /tmp/build.log
        timeout-minutes: 180

      - name: Strip libblender.so
        run: |
          NDK_DIR="${{ steps.setup-ndk.outputs.ndk-path }}"
          STRIP="$NDK_DIR/toolchains/llvm/prebuilt/linux-x86_64/bin/llvm-strip"
          SO="${{ github.workspace }}/build/lib/libblender.so"
          if [ -f "$SO" ]; then
            ls -lh "$SO"
            "$STRIP" -s "$SO"
            ls -lh "$SO"
          fi
          # Also strip any other .so in lib/
          find "${{ github.workspace }}/build/lib" -name "*.so" -exec "$STRIP" -s {} \;

      - name: Upload build log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: /tmp/build.log
          retention-days: 7

      - name: List build artifacts
        run: |
          echo "=== Whole build/ ==="
          find ${{ github.workspace }}/build -maxdepth 3 -type f -exec ls -lh {} \; 2>/dev/null | head -50
          echo "=== .so files ==="
          find ${{ github.workspace }}/build -name "*.so" -exec ls -lh {} \; 2>/dev/null || echo "No .so files"
          echo "=== Executables ==="
          find ${{ github.workspace }}/build -type f -executable -exec ls -lh {} \; 2>/dev/null | head -20
          echo "=== bin/ ==="
          ls -lh ${{ github.workspace }}/build/bin/ 2>/dev/null || echo "No bin/"
          echo "=== lib/ ==="
          ls -lh ${{ github.workspace }}/build/lib/ 2>/dev/null || echo "No lib/"
          echo "=== libblender.so ==="
          find ${{ github.workspace }}/build -name "libblender*" -exec ls -lh {} \; 2>/dev/null || echo "Not found"
          echo "=== Build sizes ==="
          du -sh ${{ github.workspace }}/build/lib/ 2>/dev/null || true
          du -sh ${{ github.workspace }}/build/bin/ 2>/dev/null || true

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
        with:
          name: blender-android-arm64
          path: |
            ${{ github.workspace }}/build/lib/*.so
            ${{ github.workspace }}/build/bin/libblender.so
            ${{ github.workspace }}/build_host/source/blender/makesdna/intern/**
            ${{ github.workspace }}/build/source/blender/makesdna/intern/**
            ${{ github.workspace }}/build/source/blender/makesrna/intern/**
          retention-days: 30

      - name: Save ccache
        uses: actions/cache/save@v4
        if: always()
        with:
          path: ${{ env.CCACHE_DIR }}
          key: ccache-android-${{ runner.os }}-${{ github.sha }}
